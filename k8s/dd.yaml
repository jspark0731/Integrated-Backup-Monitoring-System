apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-dashboard-collector-dd
  labels:
    app: backup-dashboard-collector
    collector-group: dd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-dashboard-collector
      collector-group: dd
  template:
    metadata:
      labels:
        app: backup-dashboard-collector
        collector-group: dd
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: collector
          image: backup-dashboard-collector-dd:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_CONFIG
              value: /app/config/collector.yaml
          volumeMounts:
            - name: config
              mountPath: /app/config/collector.yaml
              subPath: collector.yaml
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: backup-dashboard-collector-dd-config
        - name: secrets
          secret:
            secretName: backup-dashboard-collector-dd-secrets
            items:
              - key: elasticsearch-username
                path: elasticsearch/username
              - key: elasticsearch-password
                path: elasticsearch/password
              - key: dd4500-community
                path: dd/dd4500-community
              - key: dd6900-1-community
                path: dd/dd6900-1-community
              - key: dd6900-2-community
                path: dd/dd6900-2-community
---
apiVersion: v1
kind: Service
metadata:
  name: backup-dashboard-collector-dd
  labels:
    app: backup-dashboard-collector
    collector-group: dd
spec:
  selector:
    app: backup-dashboard-collector
    collector-group: dd
  ports:
    - name: http
      port: 8080
      targetPort: http

