apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-dashboard-collector-zfs-config
  labels:
    app: backup-dashboard-collector
    collector-group: zfs
data:
  collector.yaml: |
    app:
      name: backup-dashboard-collector-zfs
      log_level: INFO
    elasticsearch:
      enabled: false
      hosts:
        - http://elasticsearch:9200
      index_prefix: backup-dashboard
      username_file: /app/secrets/elasticsearch/username
      password_file: /app/secrets/elasticsearch/password
      verify_certs: true
    collectors:
      - name: ZFS_1
        type: ZFS
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 4
          second: 0
        base_url: ZFS_1_base_url_TO_BE_FILLED
        method: GET
        token_file: /app/secrets/zfs/zfs-1-token
        username_file: /app/secrets/zfs/zfs-1-username
        password_file: /app/secrets/zfs/zfs-1-password
        verify_tls: true
      - name: ZFS_2
        type: ZFS
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 4
          second: 0
        base_url: ZFS_2_base_url_TO_BE_FILLED
        method: GET
        token_file: /app/secrets/zfs/zfs-2-token
        username_file: /app/secrets/zfs/zfs-2-username
        password_file: /app/secrets/zfs/zfs-2-password
        verify_tls: true
      - name: ZFS_3
        type: ZFS
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 4
          second: 0
        base_url: ZFS_3_base_url_TO_BE_FILLED
        method: GET
        token_file: /app/secrets/zfs/zfs-3-token
        username_file: /app/secrets/zfs/zfs-3-username
        password_file: /app/secrets/zfs/zfs-3-password
        verify_tls: true
      - name: ZFS_4
        type: ZFS
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 4
          second: 0
        base_url: ZFS_4_base_url_TO_BE_FILLED
        method: GET
        token_file: /app/secrets/zfs/zfs-4-token
        username_file: /app/secrets/zfs/zfs-4-username
        password_file: /app/secrets/zfs/zfs-4-password
        verify_tls: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-dashboard-collector-zfs
  labels:
    app: backup-dashboard-collector
    collector-group: zfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-dashboard-collector
      collector-group: zfs
  template:
    metadata:
      labels:
        app: backup-dashboard-collector
        collector-group: zfs
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: collector
          image: backup-dashboard-collector-zfs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_CONFIG
              value: /app/config/collector.yaml
          volumeMounts:
            - name: config
              mountPath: /app/config/collector.yaml
              subPath: collector.yaml
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: backup-dashboard-collector-zfs-config
        - name: secrets
          secret:
            secretName: backup-dashboard-collector-zfs-secrets
            items:
              - key: elasticsearch-username
                path: elasticsearch/username
              - key: elasticsearch-password
                path: elasticsearch/password
              - key: zfs-1-token
                path: zfs/zfs-1-token
              - key: zfs-1-username
                path: zfs/zfs-1-username
              - key: zfs-1-password
                path: zfs/zfs-1-password
              - key: zfs-2-token
                path: zfs/zfs-2-token
              - key: zfs-2-username
                path: zfs/zfs-2-username
              - key: zfs-2-password
                path: zfs/zfs-2-password
              - key: zfs-3-token
                path: zfs/zfs-3-token
              - key: zfs-3-username
                path: zfs/zfs-3-username
              - key: zfs-3-password
                path: zfs/zfs-3-password
              - key: zfs-4-token
                path: zfs/zfs-4-token
              - key: zfs-4-username
                path: zfs/zfs-4-username
              - key: zfs-4-password
                path: zfs/zfs-4-password
---
apiVersion: v1
kind: Service
metadata:
  name: backup-dashboard-collector-zfs
  labels:
    app: backup-dashboard-collector
    collector-group: zfs
spec:
  selector:
    app: backup-dashboard-collector
    collector-group: zfs
  ports:
    - name: http
      port: 8080
      targetPort: http

