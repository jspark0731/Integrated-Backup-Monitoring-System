apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-dashboard-collector-networker-config
  labels:
    app: backup-dashboard-collector
    collector-group: networker
data:
  collector.yaml: |
    app:
      name: backup-dashboard-collector-networker
      log_level: INFO
    elasticsearch:
      enabled: false
      hosts:
        - http://elasticsearch:9200
      index_prefix: backup-dashboard
      username_file: /app/secrets/elasticsearch/username
      password_file: /app/secrets/elasticsearch/password
      verify_certs: true
    collectors:
      - name: networker_core
        type: Networker
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 3
          second: 0
        base_url: networker_core_base_url_TO_BE_FILLED
        method: GET
        token_file: /app/secrets/networker/networker-core-token
        username_file: /app/secrets/networker/networker-core-username
        password_file: /app/secrets/networker/networker-core-password
        verify_tls: true
      - name: networker_chnl
        type: Networker
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 3
          second: 0
        base_url: networker_chnl_base_url_TO_BE_FILLED
        method: GET
        token_file: /app/secrets/networker/networker-chnl-token
        username_file: /app/secrets/networker/networker-chnl-username
        password_file: /app/secrets/networker/networker-chnl-password
        verify_tls: true
      - name: networker_info
        type: Networker
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 3
          second: 0
        base_url: networker_info_base_url_TO_BE_FILLED
        method: GET
        token_file: /app/secrets/networker/networker-info-token
        username_file: /app/secrets/networker/networker-info-username
        password_file: /app/secrets/networker/networker-info-password
        verify_tls: true
      - name: networker_ifrs
        type: Networker
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 3
          second: 0
        base_url: networker_ifrs_base_url_TO_BE_FILLED
        method: GET
        token_file: /app/secrets/networker/networker-ifrs-token
        username_file: /app/secrets/networker/networker-ifrs-username
        password_file: /app/secrets/networker/networker-ifrs-password
        verify_tls: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-dashboard-collector-networker
  labels:
    app: backup-dashboard-collector
    collector-group: networker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-dashboard-collector
      collector-group: networker
  template:
    metadata:
      labels:
        app: backup-dashboard-collector
        collector-group: networker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: collector
          image: backup-dashboard-collector-networker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_CONFIG
              value: /app/config/collector.yaml
          volumeMounts:
            - name: config
              mountPath: /app/config/collector.yaml
              subPath: collector.yaml
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: backup-dashboard-collector-networker-config
        - name: secrets
          secret:
            secretName: backup-dashboard-collector-networker-secrets
            items:
              - key: elasticsearch-username
                path: elasticsearch/username
              - key: elasticsearch-password
                path: elasticsearch/password
              - key: networker-core-token
                path: networker/networker-core-token
              - key: networker-core-username
                path: networker/networker-core-username
              - key: networker-core-password
                path: networker/networker-core-password
              - key: networker-chnl-token
                path: networker/networker-chnl-token
              - key: networker-chnl-username
                path: networker/networker-chnl-username
              - key: networker-chnl-password
                path: networker/networker-chnl-password
              - key: networker-info-token
                path: networker/networker-info-token
              - key: networker-info-username
                path: networker/networker-info-username
              - key: networker-info-password
                path: networker/networker-info-password
              - key: networker-ifrs-token
                path: networker/networker-ifrs-token
              - key: networker-ifrs-username
                path: networker/networker-ifrs-username
              - key: networker-ifrs-password
                path: networker/networker-ifrs-password
---
apiVersion: v1
kind: Service
metadata:
  name: backup-dashboard-collector-networker
  labels:
    app: backup-dashboard-collector
    collector-group: networker
spec:
  selector:
    app: backup-dashboard-collector
    collector-group: networker
  ports:
    - name: http
      port: 8080
      targetPort: http

