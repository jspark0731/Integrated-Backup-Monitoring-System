apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-dashboard-collector-i6000-config
  labels:
    app: backup-dashboard-collector
    collector-group: i6000
data:
  collector.yaml: |
    app:
      name: backup-dashboard-collector-i6000
      log_level: INFO
    elasticsearch:
      enabled: false
      hosts:
        - https://elasticsearch:9200
      index_prefix: backup-dashboard
      username_file: /app/secrets/elasticsearch/username
      password_file: /app/secrets/elasticsearch/password
      verify_certs: true
      ca_certs: /app/secrets/elasticsearch/ca.crt
    collectors:
      - name: i6000_core_rest
        type: i6000
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 2
          second: 0
        base_url: https://i6000_core_host_TO_BE_FILLED
        username_file: /app/secrets/i6000/i6000-core-username
        password_file: /app/secrets/i6000/i6000-core-password
        verify_tls: true
        endpoints: &i6000_endpoints
          ping: aml/
          physical_library: aml/physicalLibrary
          status: aml/physicalLibrary/status
          drives: aml/drives
          media: aml/media?start=0&length=-1
          segments_storage_used: aml/physicalLibrary/segments?type=storage&status=used&start=0&length=-1
          segments_storage_available: aml/physicalLibrary/segments?type=storage&status=available&start=0&length=-1
          towers: aml/devices/towers
          ie_stations: aml/devices/ieStations
          ras_status: aml/system/ras
          ras_tickets: aml/system/ras/tickets
      - name: i6000_chnl_rest
        type: i6000
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 2
          second: 0
        base_url: https://i6000_chnl_host_TO_BE_FILLED
        username_file: /app/secrets/i6000/i6000-chnl-username
        password_file: /app/secrets/i6000/i6000-chnl-password
        verify_tls: true
        endpoints: *i6000_endpoints
      - name: i6000_info_rest
        type: i6000
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 2
          second: 0
        base_url: https://i6000_info_host_TO_BE_FILLED
        username_file: /app/secrets/i6000/i6000-info-username
        password_file: /app/secrets/i6000/i6000-info-password
        verify_tls: true
        endpoints: *i6000_endpoints
      - name: i6000_ifrs_rest
        type: i6000
        protocol: rest
        enabled: true
        schedule:
          interval_minutes: 5
          minute_offset: 2
          second: 0
        base_url: https://i6000_ifrs_host_TO_BE_FILLED
        username_file: /app/secrets/i6000/i6000-ifrs-username
        password_file: /app/secrets/i6000/i6000-ifrs-password
        verify_tls: true
        endpoints: *i6000_endpoints
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-dashboard-collector-i6000
  labels:
    app: backup-dashboard-collector
    collector-group: i6000
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-dashboard-collector
      collector-group: i6000
  template:
    metadata:
      labels:
        app: backup-dashboard-collector
        collector-group: i6000
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: collector
          image: backup-dashboard-collector-i6000:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_CONFIG
              value: /app/config/collector.yaml
          volumeMounts:
            - name: config
              mountPath: /app/config/collector.yaml
              subPath: collector.yaml
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: backup-dashboard-collector-i6000-config
        - name: secrets
          secret:
            secretName: backup-dashboard-collector-i6000-secrets
            items:
              - key: elasticsearch-username
                path: elasticsearch/username
              - key: elasticsearch-password
                path: elasticsearch/password
              - key: elasticsearch-ca.crt
                path: elasticsearch/ca.crt
              - key: i6000-core-username
                path: i6000/i6000-core-username
              - key: i6000-core-password
                path: i6000/i6000-core-password
              - key: i6000-chnl-username
                path: i6000/i6000-chnl-username
              - key: i6000-chnl-password
                path: i6000/i6000-chnl-password
              - key: i6000-info-username
                path: i6000/i6000-info-username
              - key: i6000-info-password
                path: i6000/i6000-info-password
              - key: i6000-ifrs-username
                path: i6000/i6000-ifrs-username
              - key: i6000-ifrs-password
                path: i6000/i6000-ifrs-password
---
apiVersion: v1
kind: Service
metadata:
  name: backup-dashboard-collector-i6000
  labels:
    app: backup-dashboard-collector
    collector-group: i6000
spec:
  selector:
    app: backup-dashboard-collector
    collector-group: i6000
  ports:
    - name: http
      port: 8080
      targetPort: http

