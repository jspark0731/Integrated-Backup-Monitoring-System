app:
  name: backup-dashboard-collector
  log_level: INFO

elasticsearch:
  enabled: false
  hosts:
    - http://elasticsearch:9200
  index_prefix: backup-dashboard
  username: elasticsearch_username_TO_BE_FILLED
  password: elasticsearch_password_TO_BE_FILLED
  verify_certs: true

x-dd-oids: &dd_oids
  system_serial_number: 1.3.6.1.4.1.19746.1.13.1.1.0
  system_version: 1.3.6.1.4.1.19746.1.13.1.3.0
  system_model: 1.3.6.1.4.1.19746.1.13.1.4.0
  file_system_status: 1.3.6.1.4.1.19746.1.3.1.1.0
  ddboost_status: 1.3.6.1.4.1.19746.1.12.1.1.0

